<svg viewBox="0 0 40 40" fill="none" aria-label="Holocron Logo" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer diamond -->
  <polygon points="20,2 38,20 20,38 2,20"
    stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Inner diamond rotated -->
  <polygon points="20,8 32,20 20,32 8,20"
    stroke="#00d4ff" stroke-width="1" fill="rgba(13, 37, 48, 0.6)" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="20" cy="20" r="3" fill="#00d4ff"/>
  <!-- Cross lines -->
  <line x1="20" y1="8"  x2="20" y2="32" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="8"  y1="20" x2="32" y2="20" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
</svg>
