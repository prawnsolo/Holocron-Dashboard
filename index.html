<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Holocron — OB1</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Holocron">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div id="logo-container" style="width: 40px; height: 40px; margin-bottom: var(--space-2)">
        <svg viewBox="0 0 40 40" fill="none" aria-label="Holocron Logo" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer diamond -->
          <polygon points="20,2 38,20 20,38 2,20"
            stroke="var(--color-primary)" stroke-width="1.5" fill="none" opacity="0.8"/>
          <!-- Inner diamond rotated -->
          <polygon points="20,8 32,20 20,32 8,20"
            stroke="var(--color-primary)" stroke-width="1" fill="var(--color-primary-highlight)" opacity="0.6"/>
          <!-- Center dot -->
          <circle cx="20" cy="20" r="3" fill="var(--color-primary)"/>
          <!-- Cross lines -->
          <line x1="20" y1="8"  x2="20" y2="32" stroke="var(--color-primary)" stroke-width="0.5" opacity="0.4"/>
          <line x1="8"  y1="20" x2="32" y2="20" stroke="var(--color-primary)" stroke-width="0.5" opacity="0.4"/>
        </svg>
      </div>
      <span class="logo-text">HOLOCRON</span>
      <span class="logo-sub">OB1 SYSTEM</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active" data-tab="dashboard">
        <i data-lucide="layout-dashboard"></i>
        <span>Overall</span>
      </a>
      <a href="#projects" class="nav-item" data-tab="projects">
        <i data-lucide="folder-kanban"></i>
        <span>Projects</span>
      </a>
      <a href="#memory" class="nav-item" data-tab="memory">
        <i data-lucide="brain"></i>
        <span>Memory</span>
      </a>
      <a href="#weekly" class="nav-item" data-tab="weekly">
        <i data-lucide="calendar-check"></i>
        <span>Weekly Recap</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button data-theme-toggle aria-label="Toggle theme">
        <i data-lucide="moon"></i>
      </button>
      <span class="system-time" id="systemTime"></span>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div id="tab-dashboard" class="tab-panel active"></div>
    <div id="tab-projects"  class="tab-panel"></div>
    <div id="tab-memory"    class="tab-panel"></div>
    <div id="tab-weekly"    class="tab-panel"></div>
  </main>
  
  <!-- LOGIN OVERLAY -->
  <div id="loginOverlay" class="login-overlay active">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 40 40" fill="none" style="width:60px;height:60px">
          <polygon points="20,2 38,20 20,38 2,20" stroke="var(--color-primary)" stroke-width="2" fill="none"/>
          <circle cx="20" cy="20" r="4" fill="var(--color-primary)"/>
        </svg>
      </div>
      <h2>IDENTITY VERIFICATION</h2>
      <p>Secure link to OB1 System required.</p>
      <div class="login-field">
        <input type="password" id="accessKeyInput" placeholder="Enter Holocron Access Key..." />
        <button id="loginBtn">Authorize</button>
      </div>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/memory.js"></script>
  <script src="js/weekly.js"></script>
  <script src="js/router.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
